; ═══════════════════════════════════════════════════════════════════════════
;  Shivex.ai — Device Firmware v2.0
;  PlatformIO configuration — three environments
; ═══════════════════════════════════════════════════════════════════════════

[platformio]
default_envs = esp32dev

; ── Common settings shared across all envs ──────────────────────────────────
[common]
platform  = espressif32
framework = arduino
board     = esp32dev
lib_deps  =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^6.21
    4-20ma/ModbusMaster    @ ^2.0
build_flags =
    -DFIRMWARE_VERSION=\"2.0.0\"
    -DCORE_DEBUG_LEVEL=0

; ── USB flash (development) ─────────────────────────────────────────────────
[env:esp32dev]
extends          = common
monitor_speed    = 115200
monitor_filters  = esp32_exception_decoder, time
upload_speed     = 921600

; ── OTA flash (field deployment) ────────────────────────────────────────────
[env:ota]
extends         = common
upload_protocol = espota
upload_port     = shivex-device.local   ; mDNS hostname — update per device
upload_flags    = --auth=${sysenv.OTA_PASSWORD}
monitor_speed   = 115200

; ── Native unit tests (no hardware needed) ──────────────────────────────────
[env:native]
platform    = native
build_flags = -std=c++17
test_filter = test_*
